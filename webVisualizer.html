<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cinematic Sorting Algorithms</title>
  <style>
    body {
      background: #1e1e1e;
      color: #f0f0f0;
      font-family: Consolas, monospace;
      padding: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    p.subtitle {
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    select, button, input {
      font-family: Consolas, monospace;
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: 3px;
      border: 1px solid #555;
      background: #2d2d2d;
      color: #f0f0f0;
      cursor: pointer;
    }

    button:hover { background: #3a3a3a; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button#btnRun {
      background: #4a9eff;
      border-color: #4a9eff;
      color: #000;
      font-weight: bold;
    }

    button#btnRun:hover { background: #6ab0ff; }

    label {
      font-size: 0.8rem;
      color: #aaa;
    }

    .quote-box {
      background: #2a2a2a;
      border-left: 3px solid #4a9eff;
      padding: 8px 12px;
      font-style: italic;
      font-size: 0.85rem;
      color: #ccc;
      margin-bottom: 16px;
      min-height: 28px;
    }

    .info-row {
      display: flex;
      gap: 24px;
      font-size: 0.78rem;
      color: #aaa;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .info-row span b { color: #f0f0f0; }

    #barChart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 260px;
      background: #2a2a2a;
      padding: 10px 10px 0 10px;
      border: 1px solid #444;
      border-radius: 4px;
      margin-bottom: 14px;
    }

    .bar {
      flex: 1;
      min-width: 3px;
      background: #4a9eff;
      border-radius: 2px 2px 0 0;
    }

    #logBox {
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 10px;
      height: 160px;
      overflow-y: auto;
      font-size: 0.75rem;
      line-height: 1.6;
      color: #ccc;
    }

    #logBox .highlight { color: #4a9eff; }
    #logBox .done      { color: #4ecb71; }
    #logBox .warn      { color: #dc143c; }

    .complexity-box {
      margin-top: 12px;
      font-size: 0.78rem;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px 12px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .complexity-box span b { color: #f0f0f0; }

    /* ── Light Mode ───────────────────────────── */

    body.light-mode {
      background: #f5f5f5;
      color: #111;
    }

    /* FIX: subtitle visibility */
    body.light-mode p.subtitle {
      color: #444;
    }

    body.light-mode .info-row span b {
      color: #111;
    }

    body.light-mode .controls label {
      color: #111;
    }

    body.light-mode .info-row {
      color: #111;
    }

    body.light-mode .complexity-box span b {
      color: #111;
    }

    body.light-mode .complexity-box {
      color: #111;
    }

    body.light-mode .quote-box {
      background: #ffffff;
      color: #333;
      border-left-color: #4a9eff;
    }

    body.light-mode #barChart {
      background: #ffffff;
      border: 1px solid #ccc;
    }

    body.light-mode #logBox {
      background: #ffffff;
      color: #111;
      border: 1px solid #ccc;
    }

    body.light-mode .complexity-box {
      background: #ffffff;
      color: #111;
      border: 1px solid #ccc;
    }

    body.light-mode select,
    body.light-mode input,
    body.light-mode button {
      background: #ffffff;
      color: #111;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<h1>Cinematic Sorting Algorithms</h1>
<p class="subtitle">Visual demo — John R. Chapin Undergraduate Exhibition 2026</p>

<div class="controls">
  <div>
    <label>Algorithm:</label><br/>
    <select id="algoSelect">
      <option value="thanos">Thanos Sort</option>
      <option value="interstellar">Interstellar Sort</option>
      <option value="t1000">T-1000 Sort</option>
      <option value="yoda">Yoda Sort</option>
      <option value="walle">WALL-E Sort</option>
      <option value="chigurh">Anton Chigurh Sort</option>
    </select>
  </div>
  <div>
    <label>Array size:</label><br/>
    <input type="number" id="sizeInput" value="20" min="5" max="50" style="width:60px"/>
  </div>
  <div>
    <label>Speed:</label><br/>
    <input type="range" id="speedSlider" min="1" max="10" value="6" style="width:90px; accent-color:#4a9eff"/>
  </div>
  <div style="margin-top:18px">
    <button id="btnRun">&#9654; Run</button>
    <button id="btnStop">&#9632; Stop</button>
    <button id="btnNew">New Array</button>
    <button id="btnTheme">Toggle Theme</button>
  </div>
</div>

<div class="quote-box" id="quoteBox">Select an algorithm and press Run.</div>

<div class="info-row">
  <span>Comparisons: <b id="statComps">0</b></span>
  <span>Swaps: <b id="statSwaps">0</b></span>
  <span>Passes: <b id="statPasses">0</b></span>
  <span>Status: <b id="statStatus">idle</b></span>
</div>

<div id="barChart"></div>

<div id="logBox"></div>

<div class="complexity-box">
  <span>Time (avg): <b id="cTime">—</b></span>
  <span>Worst case: <b id="cWorst">—</b></span>
  <span>Space: <b id="cSpace">—</b></span>
  <span>Lossy: <b id="cLossy">—</b></span>
  <span>Based on: <b id="cBase">—</b></span>
</div>

<script>
  const ALGO_INFO = {
    thanos:       { quote: '"Perfectly balanced, as all things should be."',
      time: 'O(n log n)', worst: 'O(n log n)', space: 'O(n)', lossy: 'Yes',
      base: 'Halving/Elimination' },
    interstellar: { quote: '"Gravity pulls everything into order."',
      time: 'O(n log n)', worst: 'O(n log n)', space: 'O(n)', lossy: 'No',
      base: 'Gravity-biased sort'  },
    t1000:        { quote: '"It reforms. It adapts. It always reaches its target."',
      time: 'O(n^2)',     worst: 'O(n^2)',     space: 'O(1)', lossy: 'No',
      base: 'Bubble Sort'          },
    yoda:         { quote: '"Do, or do not. There is no try."',
      time: 'O(n log n)', worst: 'O(n log n)', space: 'O(n)', lossy: 'No',
      base: 'Reverse + Flip'       },
    walle:        { quote: '"Directive: organize. One piece at a time."',
      time: 'O(n^2)',     worst: 'O(n^2)',     space: 'O(1)', lossy: 'No',
      base: 'Selection Sort'       },
    chigurh:      { quote: '"What\'s the most you ever lost on a coin toss?"',
      time: 'O(inf)',     worst: 'O(inf)',     space: 'O(1)', lossy: 'No',
      base: 'Bogosort/Coin-flip'   },
  };

  let arr = [], stopFlag = false, running = false;
  let comps = 0, swaps = 0, passes = 0;

  const $ = id => document.getElementById(id);
  const delay = ms => new Promise(r => setTimeout(r, ms));
  const getSpeed = () => Math.max(20, 380 - parseInt($('speedSlider').value) * 33);
  const getSize  = () => Math.min(50, Math.max(5, parseInt($('sizeInput').value) || 20));

  function randomArr(n) {
    return Array.from({ length: n }, () => Math.floor(Math.random() * 90) + 10);
  }

  function renderBars(highlights) {
    highlights = highlights || {};
    const chart = $('barChart');
    const max = Math.max.apply(null, arr);
    chart.innerHTML = '';
    for (var i = 0; i < arr.length; i++) {
      var bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = Math.max(4, Math.round((arr[i] / max) * 230)) + 'px';
      bar.style.background = highlights[i] || '#4a9eff';
      chart.appendChild(bar);
    }
  }

  function log(msg, cls) {
    var box = $('logBox');
    var line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  function updateStats() {
    $('statComps').textContent  = comps;
    $('statSwaps').textContent  = swaps;
    $('statPasses').textContent = passes;
  }

  function resetStats() {
    comps = swaps = passes = 0;
    updateStats();
    $('logBox').innerHTML = '';
    $('statStatus').textContent = 'idle';
  }

  function loadAlgoInfo() {
    var key  = $('algoSelect').value;
    var info = ALGO_INFO[key];
    $('quoteBox').textContent = info.quote;
    $('cTime').textContent    = info.time;
    $('cWorst').textContent   = info.worst;
    $('cSpace').textContent   = info.space;
    $('cLossy').textContent   = info.lossy;
    $('cBase').textContent    = info.base;
  }

  // ── Algorithms ──────────────────────────────

  async function thanosSort() {
    log('Thanos surveys the universe...');
    log('"Perfectly balanced, as all things should be."');
    await delay(getSpeed());

    while (arr.length > 2 && !stopFlag) {
      passes++;
      var sorted = arr.slice().sort(function(a,b){ return a-b; });
      var half = Math.floor(sorted.length / 2);
      var survivors = sorted.slice(half);
      var deadVals = sorted.slice(0, half);
      var hl = {};
      for (var i = 0; i < arr.length; i++) {
        hl[i] = deadVals.indexOf(arr[i]) >= 0 ? '#e05050' : '#4a9eff';
      }
      comps += arr.length; updateStats();
      renderBars(hl);
      await delay(getSpeed() * 2);
      arr = survivors;
      renderBars({});
      log('Pass ' + passes + ': ' + arr.length + ' survivors -> [' + arr.join(', ') + ']', 'highlight');
      await delay(getSpeed());
    }
    log('Done. Survivors: [' + arr.join(', ') + ']', 'done');
    log('Note: Thanos Sort is lossy -- not all elements survive.', 'warn');
  }

  async function interstellarSort() {
    var sorted = arr.slice().sort(function(a,b){ return a-b; });
    var well = sorted[Math.floor(sorted.length / 2)];
    log('Gravity well = ' + well + ' (median)');
    comps += arr.length; passes = 1; updateStats();
    await delay(getSpeed());

    arr.sort(function(a, b) {
      var da = Math.abs(a - well), db = Math.abs(b - well);
      return da !== db ? da - db : a - b;
    });
    renderBars({});
    log('Pulled toward gravity well: [' + arr.join(', ') + ']', 'highlight');
    await delay(getSpeed() * 3);

    arr.sort(function(a,b){ return a-b; });
    passes = 2; swaps += arr.length; updateStats();
    renderBars({});
    log('Settled into orbit (ascending): [' + arr.join(', ') + ']', 'done');
  }

  async function t1000Sort() {
    log('T-1000 begins reforming...');
    await delay(getSpeed());
    var swapped = true;
    while (swapped && !stopFlag) {
      swapped = false; passes++;
      for (var i = 0; i < arr.length - passes; i++) {
        if (stopFlag) break;
        comps++;
        var hl = {}; hl[i] = '#e05050'; hl[i+1] = '#e05050';
        renderBars(hl);
        await delay(getSpeed());
        if (arr[i] > arr[i+1]) {
          var tmp = arr[i]; arr[i] = arr[i+1]; arr[i+1] = tmp;
          swaps++; swapped = true;
          var hl2 = {}; hl2[i] = '#f0c040'; hl2[i+1] = '#f0c040';
          renderBars(hl2);
          await delay(getSpeed());
        }
        updateStats();
      }
      var hl3 = {};
      for (var k = arr.length - passes; k < arr.length; k++) hl3[k] = '#4ecb71';
      renderBars(hl3);
      log('Reflow pass ' + passes + ': [' + arr.join(', ') + ']', 'highlight');
    }
    renderBars({});
    log('T-1000 locked into final form: [' + arr.join(', ') + ']', 'done');
  }

  async function yodaSort() {
    log('"Begun, the sorting has."');
    arr.sort(function(a,b){ return b-a; });
    comps += arr.length; passes = 1; updateStats();
    var hl = {}; hl[0] = '#e05050';
    renderBars(hl);
    log('Descending first (Yoda\'s way): [' + arr.join(', ') + ']', 'highlight');
    await delay(getSpeed() * 4);

    var pivotIdx = Math.floor(arr.length / 2);
    var pivot = arr[pivotIdx];
    log('"The Force center I sense: ' + pivot + '"', 'warn');
    var hl2 = {}; hl2[pivotIdx] = '#f0c040';
    renderBars(hl2);
    await delay(getSpeed() * 3);

    arr.reverse();
    passes = 2; swaps += arr.length; updateStats();
    renderBars({});
    log('"Unlearn what you have learned." Result: [' + arr.join(', ') + ']', 'done');
  }

  async function walleSort() {
    log('WALL-E starts stacking...');
    await delay(getSpeed());
    for (var i = 0; i < arr.length - 1 && !stopFlag; i++) {
      passes++;
      var minIdx = i;
      for (var j = i + 1; j < arr.length; j++) {
        comps++;
        var hl = {};
        for (var k = 0; k < i; k++) hl[k] = '#4ecb71';
        hl[minIdx] = '#f0c040'; hl[j] = '#e05050';
        renderBars(hl);
        await delay(Math.floor(getSpeed() * 0.4));
        if (arr[j] < arr[minIdx]) minIdx = j;
        updateStats();
      }
      if (minIdx !== i) {
        var tmp = arr[i]; arr[i] = arr[minIdx]; arr[minIdx] = tmp;
        swaps++;
      }
      var hl2 = {};
      for (var k2 = 0; k2 <= i; k2++) hl2[k2] = '#4ecb71';
      renderBars(hl2);
      log('Stacked cube ' + (i+1) + ': value ' + arr[i], 'highlight');
      await delay(getSpeed());
      updateStats();
    }
    renderBars({});
    log('WALL-E finished: [' + arr.join(', ') + ']', 'done');
  }

  async function chigurhSort() {
    log('"What\'s the most you ever lost on a coin toss?"');
    await delay(getSpeed() * 2);

    function isSorted(a) {
      for (var i = 0; i < a.length - 1; i++) {
        if (a[i] > a[i+1]) return false;
      }
      return true;
    }

    var MAX = 1500, iter = 0;
    while (!isSorted(arr) && iter < MAX && !stopFlag) {
      iter++; passes++;
      for (var i = 0; i < arr.length - 1; i++) {
        comps++;
        var heads = Math.random() < 0.5;
        var hl = {};
        hl[i]   = heads ? '#f0c040' : '#e05050';
        hl[i+1] = heads ? '#f0c040' : '#e05050';
        renderBars(hl);
        if (heads && arr[i] > arr[i+1]) {
          var tmp = arr[i]; arr[i] = arr[i+1]; arr[i+1] = tmp;
          swaps++;
        }
        updateStats();
        if (iter <= 4) await delay(Math.floor(getSpeed() * 0.4));
      }
      if (iter <= 6 || iter % 40 === 0) {
        log('Flip ' + iter + ': [' + arr.join(', ') + ']' + (isSorted(arr) ? ' <- sorted!' : ''), isSorted(arr) ? 'done' : 'highlight');
      }
      if (iter > 6) await delay(8);
    }

    if (!isSorted(arr)) {
      arr.sort(function(a,b){ return a-b; });
      renderBars({});
      log('Anton gave up after ' + iter + ' flips and sorted it himself.', 'warn');
    } else {
      renderBars({});
      log('Sorted by fate in ' + iter + ' flips: [' + arr.join(', ') + ']', 'done');
    }
    log('"The coin knows. It always knew."');
  }

  // ── Button Handlers / Wiring ───────────────────────────────────

  $('algoSelect').onchange = loadAlgoInfo;

  $('btnNew').onclick = function() {
    if (running) return;
    arr = randomArr(getSize());
    resetStats();
    renderBars({});
  };

  $('btnStop').onclick = function() { stopFlag = true; };

  $('btnRun').onclick = async function() {
    if (running) return;
    stopFlag = false; running = true;
    $('btnRun').disabled = true;
    resetStats();
    arr = randomArr(getSize());
    renderBars({});
    $('statStatus').textContent = 'running';
    loadAlgoInfo();

    var key = $('algoSelect').value;
    var fns = {
      thanos: thanosSort,
      interstellar: interstellarSort,
      t1000: t1000Sort,
      yoda: yodaSort,
      walle: walleSort,
      chigurh: chigurhSort
    };
    await fns[key]();

    $('statStatus').textContent = stopFlag ? 'stopped' : 'done';
    running = false;
    $('btnRun').disabled = false;
  };

  $('btnTheme').onclick = function () {
    document.body.classList.toggle('light-mode');
  };

  // init
  arr = randomArr(getSize());
  loadAlgoInfo();
  renderBars({});
</script>
</body>
</html>
